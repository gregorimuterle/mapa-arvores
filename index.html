<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa de Árvores - Flores da Cunha | MARCOLINA</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --marcolina: #fd632d;
      --marcolina-dark: #d44a18;
      --marcolina-light: #ffe8dc;
      --ink: #1a1a1a;
      --paper: #fafaf7;
      --muted: #6b6b6b;
      --line: #e6e3dc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      background: var(--paper);
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: var(--marcolina);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      z-index: 1000;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    .brand-name {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: 24px;
      letter-spacing: 0.5px;
    }

    .brand-divider {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.4);
      align-self: center;
    }

    .brand-title {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: 18px;
      font-style: italic;
    }

    .stats {
      display: flex;
      gap: 18px;
      font-size: 13px;
      font-weight: 500;
    }

    .stat {
      background: rgba(255,255,255,0.15);
      padding: 6px 14px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
    }
    .stat strong { font-weight: 700; }

    /* Main layout */
    .main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    #map {
      flex: 1;
      height: 100%;
      background: #d4e4dc;
    }

    /* Side panel */
    aside {
      width: 380px;
      background: var(--paper);
      border-left: 1px solid var(--line);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .panel-empty {
      padding: 40px 28px;
      text-align: center;
      color: var(--muted);
    }
    .panel-empty .icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.4;
    }
    .panel-empty h2 {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .panel-empty p {
      font-size: 14px;
      line-height: 1.5;
    }

    .tree-card {
      padding: 0;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .tree-photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: linear-gradient(135deg, var(--marcolina-light), #fff5ee);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--marcolina);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }
    .tree-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .tree-photo .placeholder {
      text-align: center;
      padding: 20px;
    }
    .tree-photo .placeholder svg {
      display: block;
      margin: 0 auto 8px;
      opacity: 0.6;
    }

    .tree-number-badge {
      position: absolute;
      top: 14px;
      left: 14px;
      background: var(--marcolina);
      color: white;
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: 22px;
      padding: 4px 14px;
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .tree-body {
      padding: 22px 24px 28px;
    }

    .tree-name {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 28px;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .tree-scientific {
      font-style: italic;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 20px;
    }

    .tree-section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .tree-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--marcolina);
      margin-bottom: 6px;
    }

    .tree-value {
      font-size: 15px;
      line-height: 1.5;
    }

    .tree-fact-year {
      display: inline-block;
      background: var(--marcolina-light);
      color: var(--marcolina-dark);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .tree-coords {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Search */
    .search-bar {
      padding: 14px 20px;
      background: white;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .search-bar input {
      flex: 1;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      padding: 9px 14px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-bar input:focus {
      border-color: var(--marcolina);
    }

    /* Custom marker */
    .marcolina-marker {
      background: var(--marcolina);
      color: white;
      border: 3px solid white;
      border-radius: 50%;
      width: 36px !important;
      height: 36px !important;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }
    .marcolina-marker:hover {
      transform: scale(1.15);
      background: var(--marcolina-dark);
    }
    .marcolina-marker.active {
      background: var(--marcolina-dark);
      transform: scale(1.2);
      box-shadow: 0 0 0 4px rgba(253, 99, 45, 0.3), 0 2px 6px rgba(0,0,0,0.3);
    }

    /* Mobile */
    @media (max-width: 768px) {
      .main { flex-direction: column; }
      aside {
        width: 100%;
        max-height: 50vh;
        border-left: none;
        border-top: 1px solid var(--line);
      }
      #map { min-height: 50vh; }
      .brand-title { display: none; }
      .stats { gap: 8px; }
      .stat { padding: 4px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="brand-name">MARCOLINA</span>
      <span class="brand-divider"></span>
      <span class="brand-title">Mapa de Árvores · Flores da Cunha</span>
    </div>
    <div class="stats">
      <span class="stat"><strong id="stat-count">0</strong> árvores mapeadas</span>
    </div>
  </header>

  <div class="main">
    <div id="map"></div>

    <aside>
      <div class="search-bar">
        <input type="text" id="search" placeholder="Buscar por número, nome ou local..." />
      </div>
      <div id="panel">
        <div class="panel-empty">
          <div class="icon">🌳</div>
          <h2>Selecione uma árvore</h2>
          <p>Clique em qualquer marcador no mapa para ver os detalhes da árvore, o fato histórico e a foto da placa.</p>
        </div>
      </div>
    </aside>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <script>
    // Center on Flores da Cunha, RS
    const FLORES_DA_CUNHA = [-29.029, -51.181];

    const map = L.map('map', {
      center: FLORES_DA_CUNHA,
      zoom: 15,
      zoomControl: true
    });

    // OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> · MARCOLINA',
      maxZoom: 19
    }).addTo(map);

    let trees = [];
    let markers = {};
    let activeMarker = null;

    // Custom icon factory
    function makeIcon(numero) {
      return L.divIcon({
        className: '',
        html: `<div class="marcolina-marker" data-num="${numero}">${numero}</div>`,
        iconSize: [36, 36],
        iconAnchor: [18, 18]
      });
    }

    // Render side panel
    function renderTree(tree) {
      const panel = document.getElementById('panel');

      // try image, fall back to placeholder
      const imgHtml = `
        <img src="${tree.foto}" alt="Placa da árvore ${tree.numero}"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
        <div class="placeholder" style="display:none; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <path d="M21 15l-5-5L5 21" />
          </svg>
          <span>Foto em img/${tree.foto.split('/').pop()}</span>
        </div>
      `;

      panel.innerHTML = `
        <div class="tree-card">
          <div class="tree-photo">
            <div class="tree-number-badge">N° ${tree.numero}</div>
            ${imgHtml}
          </div>
          <div class="tree-body">
            <h2 class="tree-name">${tree.nome}</h2>
            <div class="tree-scientific">${tree.nome_cientifico}</div>

            <div class="tree-section">
              <div class="tree-label">Local</div>
              <div class="tree-value">${tree.local}</div>
              <div class="tree-coords">${tree.latitude.toFixed(5)}, ${tree.longitude.toFixed(5)}</div>
            </div>

            <div class="tree-section">
              <div class="tree-label">Fato Histórico</div>
              <div class="tree-fact-year">Fato de ${tree.ano_fato}</div>
              <div class="tree-value">${tree.fato}</div>
            </div>
          </div>
        </div>
      `;
    }

    // Highlight active marker
    function setActiveMarker(numero) {
      document.querySelectorAll('.marcolina-marker').forEach(el => el.classList.remove('active'));
      const el = document.querySelector(`.marcolina-marker[data-num="${numero}"]`);
      if (el) el.classList.add('active');
      activeMarker = numero;
    }

    // Load JSON and render markers
    fetch('arvores.json')
      .then(r => {
        if (!r.ok) throw new Error('Falha ao carregar arvores.json');
        return r.json();
      })
      .then(data => {
        trees = data;
        document.getElementById('stat-count').textContent = trees.length;

        const bounds = [];
        trees.forEach(tree => {
          const marker = L.marker([tree.latitude, tree.longitude], {
            icon: makeIcon(tree.numero)
          }).addTo(map);

          marker.on('click', () => {
            renderTree(tree);
            setActiveMarker(tree.numero);
          });

          markers[tree.numero] = marker;
          bounds.push([tree.latitude, tree.longitude]);
        });

        if (bounds.length > 1) {
          map.fitBounds(bounds, { padding: [60, 60] });
        } else if (bounds.length === 1) {
          map.setView(bounds[0], 17);
        }
      })
      .catch(err => {
        document.getElementById('panel').innerHTML = `
          <div class="panel-empty">
            <div class="icon">⚠️</div>
            <h2>Erro ao carregar dados</h2>
            <p>${err.message}<br><br>Verifique se o arquivo <strong>arvores.json</strong> está na mesma pasta que o index.html.</p>
          </div>
        `;
      });

    // Search
    document.getElementById('search').addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      if (!q) return;

      const match = trees.find(t =>
        String(t.numero) === q ||
        t.nome.toLowerCase().includes(q) ||
        t.local.toLowerCase().includes(q)
      );

      if (match) {
        map.setView([match.latitude, match.longitude], 18, { animate: true });
        renderTree(match);
        setActiveMarker(match.numero);
      }
    });
  </script>
</body>
</html>
